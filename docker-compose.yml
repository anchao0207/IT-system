services:
  app:
    build: .
    container_name: computech-ops-app
    env_file:
      - .env
    environment:
      BASEROW_URL: http://host.docker.internal:8080
      BASEROW_HOST_HEADER: localhost:8080
      NEXTAUTH_URL: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      - baserow

  baserow:
    image: baserow/baserow:2.2.2
    container_name: computech-baserow
    environment:
      BASEROW_PUBLIC_URL: ${BASEROW_PUBLIC_URL:-http://localhost:8080}
      SECRET_KEY: ${BASEROW_JWT_SECRET:-replace-this-secret}
    ports:
      - "8080:80"
    volumes:
      - baserow_data:/baserow/data

volumes:
  baserow_data:
