server {
    listen 80;
    server_name computech.local baserow.computech.local;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name computech.local;

    ssl_certificate /etc/nginx/ssl/computech.local.crt;
    ssl_certificate_key /etc/nginx/ssl/computech.local.key;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 443 ssl http2;
    server_name baserow.computech.local;

    ssl_certificate /etc/nginx/ssl/computech.local.crt;
    ssl_certificate_key /etc/nginx/ssl/computech.local.key;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
